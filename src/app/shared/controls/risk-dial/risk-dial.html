<div class="dial-wrapper" [class.is-disabled]="disabled()" [class.is-invalid]="invalid()">
  <svg
    #dialSvg
    viewBox="0 0 100 100"
    class="dial-svg"
    [class.dragging]="isDragging"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp($event)"
    (pointercancel)="onPointerUp($event)"
    role="slider"
    [attr.aria-label]="dialLabel()"
    [attr.aria-valuenow]="value()"
    [attr.aria-valuemin]="rangeMin()"
    [attr.aria-valuemax]="rangeMax()"
  >
    <defs>
      <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="2" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <filter id="track-glow" x="-10%" y="-10%" width="120%" height="120%">
        <feGaussianBlur stdDeviation="1" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>

    <!-- Background track -->
    <path
      [attr.d]="bgArcPath"
      class="track-bg"
      fill="none"
      stroke="rgba(148,163,184,0.12)"
      [attr.stroke-width]="8"
      stroke-linecap="round"
    />

    <!-- Value arc -->
    @if (valueArcPath()) {
      <path
        [attr.d]="valueArcPath()"
        class="track-value"
        fill="none"
        [attr.stroke]="arcColor()"
        [attr.stroke-width]="8"
        stroke-linecap="round"
        filter="url(#track-glow)"
      />
    }

    <!-- Centre label -->
    <text x="50" y="44" text-anchor="middle" class="dial-value-text">
      {{ displayValue() }}
    </text>
    <text x="50" y="55" text-anchor="middle" class="dial-unit-text">
      {{ unit() }}
    </text>
    <text x="50" y="64" text-anchor="middle" class="dial-label-text">
      {{ dialLabel() }}
    </text>

    <!-- Thumb -->
    <circle
      [attr.cx]="thumbPos().x"
      [attr.cy]="thumbPos().y"
      r="6"
      [attr.fill]="arcColor()"
      class="dial-thumb"
      [class.thumb-dragging]="isDragging"
      filter="url(#glow)"
    />
    <!-- Thumb inner highlight -->
    <circle
      [attr.cx]="thumbPos().x"
      [attr.cy]="thumbPos().y"
      r="2.5"
      fill="white"
      opacity="0.7"
      class="pointer-events-none"
    />
  </svg>

  @if (invalid() && errors().length > 0) {
    <p class="dial-error">{{ errors()[0].message }}</p>
  }
</div>
