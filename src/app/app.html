<div class="app-shell">

  <header class="app-header" role="banner">
    <div class="header-inner">

      <div class="brand">
        <div class="brand-icon" aria-hidden="true">⬡</div>
        <span class="brand-name">NEXUS<span class="brand-accent">TRADE</span></span>
        <span class="brand-tag">Signal Forms · Angular 22</span>
      </div>

      <nav class="tab-nav" aria-label="Main navigation">
        <a routerLink="/demo" routerLinkActive="tab-active" class="tab-link">
          <span class="tab-icon" aria-hidden="true">⬡</span>
          Trade Demo
        </a>
        <a routerLink="/skills" routerLinkActive="tab-active" class="tab-link">
          <span class="tab-icon" aria-hidden="true">◈</span>
          Signal Forms Skills
        </a>
      </nav>

      <div class="header-meta">
        <span class="meta-item">
          <span class="meta-dot dot-b"></span>
          <span>B</span>
          <span class="meta-id">{{ instrumentId() || '—' }}</span>
        </span>
        <span class="meta-sep">|</span>
        <span class="meta-item">
          <span class="meta-dot dot-c"></span>
          <span>C</span>
          <span class="meta-id">{{ riskProfileId() || '—' }}</span>
        </span>
        <span class="meta-sep">|</span>
        <span class="meta-item">
          <span class="meta-dot dot-log"></span>
          <span>{{ logService.entries().length }}</span>
        </span>
      </div>
    </div>
  </header>

  <div class="app-page">
    <router-outlet />
  </div>

</div>
